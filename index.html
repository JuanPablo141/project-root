<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Avalie seu Curso</title>
  <link rel="stylesheet" href="tela-comentario.css">
</head>

<body>

  <div class="container">

    <h1>Avalie seu Curso!</h1>

    <div class="card">

      <p class="top-text">Envie seu comentário e avaliação!</p>

      <label>Selecione um Curso:</label>
      <select id="curso">
        <option>Administração</option>
        <option>Ciência da Computação</option>
        <option>Direito</option>
      </select>

      <label>Bloco do Curso:</label>
      <select id="bloco">
        <option>Bloco A</option>
        <option>Bloco B</option>
        <option>Bloco C</option>
      </select>

      <label>Seu Comentário:</label>
      <textarea id="comentario" placeholder="Escreva seu comentário..."></textarea>

      <label>Avalie o curso:</label>
      <div class="avaliacao">
        <span onclick="avaliar(1)">😡</span>
        <span onclick="avaliar(2)">😐</span>
        <span onclick="avaliar(3)">😀</span>
      </div>

      <button onclick="enviar()">Enviar</button>

    </div>

    <div id="listaComentarios"></div>

  </div>

  <script src="tela.js"></script>

</body>
</html>
