
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Avaliação de cursos</title>
  <link rel="stylesheet" href="../css/tela-de-login.css">
</head>
<body>
  <div class="container">
    <div class="left"></div>

    <div class="right">
      <div class="login-box">

        <h2>Informe sua matrícula</h2>

        <form id="formLogin" novalidate>
          <label for="login">Login:</label>
          <input type="text" id="login" name="login" placeholder="Digite sua matrícula">

          <label for="senha">Senha:</label>
          <div class="senha-container">
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

          </div>

          <button type="submit" id="btnLogin">Entrar</button>
        </form>


          <div class="link-item">
            <span class="link-text">Não sabe sua senha?</span>
            <span 
            class="action-link">Recupere seu acesso. </span>

          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
