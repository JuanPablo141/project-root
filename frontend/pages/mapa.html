<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ser Educacional - Avaliações</title>

  <link rel="stylesheet" href="../css/mapa.css">
  <script src="../js/mapa.js" defer></script>
</head>
<body>

<header class="top-header">

  <div class="header-left">
    <img src="../assets/logouninassau.PNG" alt="Uninassau">
  </div>

  <div class="header-center">
    <h1>Encontre seu bloco</h1>
    <p>Mapa de satisfação por bloco</p>
  </div>

</header>

<div class="container">

 <div id="map">

  <button class="bloco" style="top: 25%; left: 30%;">A</button>

  <button class="bloco" style="top: 80%; left: 45%;">B</button>

  <button class="bloco" style="top: 45%; left: 32%;">C</button>

  <button class="bloco" style="top: 50%; left: 45%;">D</button>

  <button class="bloco" style="top: 85%; left: 30%;">E</button>

  <button class="bloco" style="top: 80%; left: 55%;">F</button>

  <button class="bloco" style="top: 65%; left: 27%;">G</button>

</div>

  <div class="sidebar">

    <div class="filters">
      <label>Blocos</label>
    <select id="bloco">
  <option value="" selected disabled>Selecione um bloco</option>

  <option value="A">Bloco A</option>
  <option value="B">Bloco B</option>
  <option value="C">Bloco C</option>
  <option value="D">Bloco D</option>
  <option value="E">Bloco E</option>
  <option value="F">Bloco F</option>
  <option value="G">Bloco G</option>
</select>
    </div>

    <h3>Avaliações dos Usuários</h3>

    <div class="reviews-container"></div>

</div>

</body>
</html>
